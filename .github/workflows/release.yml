name: Build & Release IPA

# Manual trigger only — you decide when to ship.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string
      chapter:
        description: "Chapter label for release title (e.g. Chapter 1: The Observer)"
        required: true
        type: string
        default: "Chapter 1: The Observer"
      release_notes:
        description: "Release notes (markdown)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Ruby / xcpretty ────────────────────────────────────────────────
      - name: Setup Ruby and xcpretty
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # ── 3. Xcode ───────────────────────────────────────────────────────────
      - name: Select Xcode
        run: |
          # List available Xcode versions for debugging
          ls /Applications/Xcode*.app 2>/dev/null || true
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      # ── 4. Signing — temporary keychain ───────────────────────────────────
      - name: Install signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the .p12 certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Make the keychain searchable
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          # Get the UUID embedded in the profile to name it correctly
          UUID=$(security cms -D -i "$PP_PATH" | \
            plutil -extract UUID raw -)

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

          echo "Installed profile UUID: $UUID"

      # ── 5. Build ───────────────────────────────────────────────────────────
      - name: Archive
        run: |
          xcodebuild archive \
            -project InstrumentationJourney.xcodeproj \
            -scheme InstrumentationJourney \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/InstrumentationJourney.xcarchive" \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            | xcpretty || true

      # ── 5. Export IPA ──────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          # Inject the team ID into the ExportOptions before exporting
          sed "s/TEAM_ID_PLACEHOLDER/${{ secrets.TEAM_ID }}/g" \
            ExportOptions.plist > "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/InstrumentationJourney.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            | xcpretty || true

          # Verify the IPA was created
          ls -lh "$RUNNER_TEMP/export/"

      # ── 6. Upload dSYM as artifact (for crash symbolication) ──────────────
      - name: Upload dSYM
        uses: actions/upload-artifact@v4
        with:
          name: dSYM-v${{ inputs.version }}
          path: ${{ runner.temp }}/InstrumentationJourney.xcarchive/dSYMs/
          retention-days: 90

      # ── 7. GitHub Release ──────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="${{ inputs.release_notes }}"

          # Append the standard LLDB attach guide to every release
          NOTES="$NOTES

## ${{ inputs.chapter }}

### Install
Download \`InstrumentationJourney.ipa\` and install via [AltStore](https://altstore.io) or Apple Configurator.

### Requirements
- iOS 16+ device with **Developer Mode** enabled
  (Settings → Privacy & Security → Developer Mode)
- Mac with Xcode installed (for LLDB)

### Attach LLDB
\`\`\`bash
xcrun lldb
(lldb) device select \"your device name\"
(lldb) device process attach -n InstrumentationJourney
\`\`\`
"

          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "v${{ inputs.version }}" \
            "$RUNNER_TEMP/export/InstrumentationJourney.ipa" \
            --title "v${{ inputs.version }} — ${{ inputs.chapter }}" \
            --notes "$NOTES" \
            $PRERELEASE_FLAG

      # ── 8. Cleanup keychain ────────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
