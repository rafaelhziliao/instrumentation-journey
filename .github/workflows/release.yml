name: Build & Release

# Manual trigger — run when you want to cut a new release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string
      chapter:
        description: "Chapter label (e.g. Chapter 1: The Observer)"
        required: true
        type: string
        default: "Chapter 1: The Observer"
      release_notes:
        description: "Release notes (markdown)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Xcode ───────────────────────────────────────────────────────────
      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      # ── 3. xcpretty ───────────────────────────────────────────────────────
      - name: Install xcpretty
        run: gem install xcpretty --no-document

      # ── 4. Build (unsigned) ────────────────────────────────────────────────
      # Builds without code signing to verify the project compiles cleanly.
      # Participants install by cloning and building in their own Xcode,
      # which signs automatically with their development certificate —
      # this is required for get-task-allow:true to work with LLDB anyway.
      - name: Build
        run: |
          xcodebuild build \
            -project InstrumentationJourney.xcodeproj \
            -scheme InstrumentationJourney \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      # ── 5. Tag and release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          NOTES="${{ inputs.release_notes }}"
          NOTES="$NOTES

## ${{ inputs.chapter }}

### How to install

Clone the repo and open in Xcode. Change the signing team to your own Apple Developer account and run on your device.

\`\`\`bash
git clone https://github.com/${{ github.repository }}
cd InstrumentationJourney
open InstrumentationJourney.xcodeproj
\`\`\`

> Xcode is required because \`get-task-allow: true\` (needed for LLDB attach) is only preserved when signed with a development certificate — which Xcode applies automatically when you run on device.

### Requirements
- iOS 16+ device with **Developer Mode** enabled
- Mac with Xcode

### Attach LLDB
\`\`\`bash
xcrun lldb
(lldb) device select \"your device name\"
(lldb) device process attach -n InstrumentationJourney
\`\`\`"

          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }} — ${{ inputs.chapter }}" \
            --notes "$NOTES" \
            --target "${{ github.sha }}" \
            $PRERELEASE_FLAG
