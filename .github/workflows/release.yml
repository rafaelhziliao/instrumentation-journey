name: Build & Release IPA

# Manual trigger — run when you want to cut a new release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string
      chapter:
        description: "Chapter being released"
        required: true
        type: choice
        options:
          - "Chapter 01: The Observer"
          - "Chapter 02: The Messenger"
          - "Chapter 03: The Interceptor"
          - "Chapter 04: The Linker"
          - "Chapter 05: The Import Rewriter"
          - "Chapter 06: The Inline Hook"
          - "Chapter 07: The Toolkit"
          - "Chapter 08: The Real Target"
      release_notes:
        description: "Release notes (markdown, optional)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Xcode ───────────────────────────────────────────────────────────
      - name: Select Xcode
        run: |
          sudo xcode-select -s \
            "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      # ── 3. Tools ───────────────────────────────────────────────────────────
      - name: Install build tools
        run: |
          gem install xcpretty --no-document
          brew install xcodegen

      # ── 4. Generate Xcode project ──────────────────────────────────────────
      # The .xcodeproj is generated from project.yml — never committed to git.
      - name: Generate project
        run: xcodegen generate

      # ── 5. Archive (unsigned) ──────────────────────────────────────────────
      # Builds a Release archive without code signing.
      # AltStore re-signs with the reader's own Apple ID (development cert),
      # which automatically includes get-task-allow:true — required for LLDB.
      - name: Archive
        run: |
          xcodebuild archive \
            -project InstrumentationJourney.xcodeproj \
            -scheme InstrumentationJourney \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/InstrumentationJourney.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty

      # ── 6. Package IPA ─────────────────────────────────────────────────────
      # Wraps the .app bundle in the standard IPA structure (Payload/App.app).
      # No signature — AltStore expects this format and handles signing itself.
      - name: Package IPA
        run: |
          APP=$(find "$RUNNER_TEMP/InstrumentationJourney.xcarchive" \
            -name "*.app" -maxdepth 4 | head -1)

          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"

          cd "$RUNNER_TEMP/ipa"
          zip -r "$RUNNER_TEMP/InstrumentationJourney.ipa" Payload/

          echo "IPA size: $(du -sh "$RUNNER_TEMP/InstrumentationJourney.ipa" | cut -f1)"

      # ── 7. Build release notes ─────────────────────────────────────────────
      # Written to a file to avoid YAML/bash quoting issues with multiline text.
      - name: Build release notes
        run: |
          cat > "$RUNNER_TEMP/notes.md" << 'EOF'
          ${{ inputs.release_notes }}

          ## ${{ inputs.chapter }}

          ### Install via Sideloadly

          Sideloadly signs the app with your own Apple ID (development certificate),
          which automatically grants the `get-task-allow` entitlement.
          This entitlement is required for LLDB to attach to the process.

          1. Install [Sideloadly](https://sideloadly.io) on your Mac or Windows PC
          2. Connect your iPhone/iPad via USB
          3. Download `InstrumentationJourney.ipa` from this release
          4. Drag the IPA into Sideloadly, enter your Apple ID and click Start
          5. Enable **Developer Mode** on the device (Settings > Privacy & Security > Developer Mode)
          6. Trust the app certificate (Settings > General > VPN & Device Management)

          ### Attach LLDB

          ```bash
          lldb
          (lldb) device list
          (lldb) device select "your device name"
          (lldb) device process attach -n InstrumentationJourney --waitfor
          ```

          ### Requirements
          - iOS 16+ device
          - Mac with Xcode installed (LLDB is bundled with Xcode)
          EOF

      # ── 8. GitHub Release ──────────────────────────────────────────────────
      # Deletes any existing release and tag with the same version before
      # creating a fresh one. Safe to re-run for the same version.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          TAG="v${{ inputs.version }}"

          # Delete existing release + tag if they exist (idempotent re-run).
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag
          fi

          gh release create "$TAG" \
            "$RUNNER_TEMP/InstrumentationJourney.ipa" \
            --title "$TAG: ${{ inputs.chapter }}" \
            --notes-file "$RUNNER_TEMP/notes.md" \
            --target "${{ github.sha }}" \
            $PRERELEASE_FLAG
