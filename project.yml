name: InstrumentationJourney

options:
  bundleIdPrefix: dev.instrumentation
  deploymentTarget:
    iOS: "16.0"
  defaultConfig: Debug
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: JRF6244U5C
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_BITCODE: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  InstrumentationJourney:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: InstrumentationJourney
        excludes:
          - "**/*.entitlements"

    resources:
      - InstrumentationJourney/Resources/Assets.xcassets

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.instrumentation.instrumentationJourney
        PRODUCT_NAME: InstrumentationJourney
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_ENTITLEMENTS: InstrumentationJourney/Resources/InstrumentationJourney.entitlements
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          CODE_SIGN_IDENTITY: "iPhone Developer"
